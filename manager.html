            <input type="text" id="photo" placeholder="사진 URL을 입력해주세요 (사진은 정사각형 크기만 가능합니다)">
            <label for="sort" id="sortl">분류</label>

    <script>
        let users = JSON.parse(localStorage.getItem('hrUsersDatabase')) || [];

        function switchView(viewId){
            document.getElementById('loginView').classList.remove('active');
            document.getElementById('signupView').classList.remove('active');
            document.getElementById('hrView').classList.remove('active');

            document.getElementById(viewId).classList.add('active');
        }

        function handleSignup(){
            const idInput = document.getElementById('signupId').value.trim();
            const pwInput = document.getElementById('signupPw').value.trim();

            if (!idInput || !pwInput){
                return alert("정보를 모두 입력해 주세요!");
            }

            const isExist = users.some(function(user){
                return user.id === idInput;
            });

            if (isExist){
                return alert("이미 사용 중인 아이디입니다.");
            }

            users.push({
                id: idInput,
                password: pwInput,
            });
            localStorage.setItem('hrUsersDatabase', JSON.stringify(users));

            alert("가입이 완료되었습니다! 로그인 해주세요.")

            document.getElementById('signupId').value = "";
            document.getElementById('signupPw').value = "";

            switchView('loginView');
        }

        function handleLogin(){
            const idInput = document.getElementById('loginId').value.trim();
            const pwInput = document.getElementById('loginPw').value.trim();

            if (!idInput || !pwInput){
                return alert("아이디와 비밀번호를 입력해 주세요.");
            }

            const user = users.find(function(u){
                return u.id === idInput && u.password === pwInput
            });

            if (user){
                sessionStorage.setItem('loggedInUser', user.id);
                initApp();
            }
            else {
                alert("아이디 또는 비밀번호가 틀렸습니다.");
            }
        }

        function initApp(){
            const loggedInUser = sessionStorage.getItem('loggedInUser');

            if(loggedInUser){
                switchView('hrView')
            }
            else{
                switchView('loginView')
            }
        }

        function logout(){
            switchView('loginView')
        }

        function updateButton(){
            const key = document.getElementById('name').value.trim();

            const data = {
                name: document.getElementById('name').value,
                img: document.getElementById('photo').value,
                type: document.getElementById('sort').value,
                shape: document.getElementById('shape').value,
                family: document.getElementById('depart').value,
                size: document.getElementById('height').value,
                color: document.getElementById('color').value,
                env: document.getElementById('environ').value,
                info: document.getElementById('info').value,
                newname: document.getElementById('newname').value
            };

            if (!key){
                alert("식물명을 입력하세요!");
                return;
            }

            let plantData = JSON.parse(localStorage.getItem('plantData')) || {};

            plantData[key] = data;

            localStorage.setItem('plantData', JSON.stringify(plantData));

            const plantCards = document.querySelectorAll('.plant_info');

            plantCards.forEach(card => {
                if (card.dataset.plant === key) {
                    card.querySelector('.name').textContent = data.name;
                    card.querySelector('img').src = data.img;
                }
            });

            alert("수정 완료!")

            document.getElementById('name').value = "";
            document.getElementById('photo').value = "";
            document.getElementById('sort').value = "";
            document.getElementById('shape').value = "";
            document.getElementById('depart').value = "";
            document.getElementById('height').value = "";
            document.getElementById('color').value = "";
            document.getElementById('environ').value = "";
            document.getElementById('info').value = "";
            document.getElementById('code').value = "";
            document.getElementById('newname').value = "";
        }

        initApp();
    </script>
